replicaCount: 1

secretName: agent-lab-secret

image:
  repository: bsantanna/agent-lab
  pullPolicy: Always
  # Defaults to the chart appVersion (prefixed with "v") when empty
  tag: ""

imagePullSecrets: []

nameOverride: ""

fullnameOverride: ""

config:
  embeddings_endpoint: ""
  telemetry_endpoint: ""

serviceAccount:
  create: true
  automount: false

service:
  type: ClusterIP
  port: 8000

podAnnotations: { }

podLabels: { }

podSecurityContext: { }

securityContext: { }

ingress:
  enabled: false
  className: "traefik"
  annotations:
    # cert-manager.io/issuer: "letsencrypt-prod"
  hosts:
    - host: agentlab.cluster.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName:agent-lab-tls
  #    hosts:
  #      - agentlab.cluster.local

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
    ephemeral-storage: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 512Mi

livenessProbe:
  httpGet:
    path: /status/liveness
    port: http
readinessProbe:
  httpGet:
    path: /status/readiness
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

cdp:
  enabled: true
  image: chromedp/headless-shell:152.0.7939.3
  port: 9222
  livenessProbe:
    httpGet:
      path: /json/version
      port: 9222
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /json/version
      port: 9222
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 512Mi
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 256Mi
