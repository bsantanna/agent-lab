name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  build:
    name: Build and scan
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv sync --frozen --group dev --group test
          sudo apt update -yq && sudo apt install -yq ffmpeg
      - name: Lint
        run: |
          uv run python -m flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run python -m flake8 app tests --count --exit-zero --statistics
      - name: Test
        run: |
          uv run pytest --cov=app --cov-report=xml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          LANGWATCH_API_KEY: ${{ secrets.LANGWATCH_API_KEY }}
          LANGWATCH_ENDPOINT: ${{ secrets.LANGWATCH_ENDPOINT }}
          BUILD_WORKFLOW: "True"
      - name: SonarQube
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
