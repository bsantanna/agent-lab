name: PyPI Publish

on:
  workflow_run:
    workflows: [ "Release" ]
    types:
      - completed

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify built version matches release tag
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          VERSION="${TAG#v}"
          test -f "dist/btech_agent_lab-${VERSION}-py3-none-any.whl" \
            || { echo "::error::wheel for version ${VERSION} (tag ${TAG}) not found"; ls -l dist; exit 1; }

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/btech-agent-lab/
    permissions:
      id-token: write   # OIDC — mandatory for Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
