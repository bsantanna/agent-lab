apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ cookiecutter.project_slug }}
  labels:
    app: {{ cookiecutter.project_slug }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ cookiecutter.project_slug }}
  template:
    metadata:
      labels:
        app: {{ cookiecutter.project_slug }}
    spec:
      # Bound to the Vault kubernetes-auth role managed by 03_vault_config
      serviceAccountName: {{ cookiecutter.project_slug }}
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: {{ cookiecutter.project_slug }}
          # Tag is pinned by the images override in kustomization.yaml
          image: ghcr.io/{{ cookiecutter.github_repository }}
          ports:
            - name: http
              containerPort: 8000
          # VAULT_K8S_ROLE selects agent_lab's KubernetesVaultConfigSource:
          # the app logs in to Vault with its ServiceAccount token and loads
          # all config from Vault KV (secret/app_secrets); no static tokens
          # anywhere.
          env:
            - name: VAULT_URL
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_K8S_ROLE
              value: "{{ cookiecutter.project_slug }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
