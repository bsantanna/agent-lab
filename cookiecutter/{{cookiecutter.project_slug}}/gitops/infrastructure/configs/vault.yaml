apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: vault
spec:
  interval: 1h
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
  # A fresh Vault needs a one-time `vault operator init` (auto-unseal covers
  # every restart after that). disableWait keeps Flux from blocking on that
  # one-time bootstrap; the readinessProbe override below makes the pod Ready
  # while still uninitialized so it is reachable through the ingress for init.
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
  values:
    server:
      # Make the readiness probe tolerate an *uninitialized* Vault (return 204
      # for uninitcode) so the pod is Ready — and therefore routable through the
      # traefik ingress — before `vault operator init` has ever run. Without
      # this a fresh Vault is sealed/NotReady, traefik refuses to route to it
      # ("no available server"), and 03_vault_config cannot initialize it over
      # the public ingress (chicken-and-egg). sealedcode is left at its default
      # (503) so an initialized-but-sealed Vault — e.g. an auto-unseal failure —
      # is still marked NotReady and kept out of rotation.
      readinessProbe:
        enabled: true
        path: "/v1/sys/health?uninitcode=204"
      standalone:
        # Chart default config plus the azurekeyvault seal; ${...} values are
        # substituted by Flux postBuild from terraform/aks/02_gitops vars.
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "file" {
            path = "/vault/data"
          }
          seal "azurekeyvault" {
            tenant_id  = "${azure_tenant_id}"
            client_id  = "${unseal_client_id}"
            vault_name = "${unseal_key_vault_name}"
            key_name   = "${unseal_key_name}"
          }
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: ${vault_hostname}
            paths: ["/"]
        tls:
          - secretName: vault-tls-secret
            hosts:
              - ${vault_hostname}
