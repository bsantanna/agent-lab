apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: {{ cookiecutter.project_slug }}
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pg-app
  namespace: {{ cookiecutter.project_slug }}
spec:
  interval: 30m
  chart:
    spec:
      chart: cluster
      version: "0.8.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  install:
    remediation:
      retries: 3
  values:
    cluster:
      instances: 1
      imageName: ${pg_image}
      storage:
        size: 5Gi
---
