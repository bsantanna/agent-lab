apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ot-helm
  namespace: {{ cookiecutter.project_slug }}
spec:
  interval: 1h
  url: https://ot-container-kit.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: {{ cookiecutter.project_slug }}
spec:
  interval: 30m
  chart:
    spec:
      chart: redis
      version: "0.16.9"
      sourceRef:
        kind: HelmRepository
        name: ot-helm
  install:
    remediation:
      retries: 3
  values:
    featureGates:
      GenerateConfigInInitContainer: true
