apiVersion: v1
kind: Namespace
metadata:
  name: traefik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
  install:
    remediation:
      retries: 3
  values:
    ports:
      web:
        port: 8000
        protocol: TCP
      websecure:
        port: 8443
        protocol: TCP
      traefik:
        port: 9000
    service:
      enabled: true
      type: LoadBalancer
    securityContext:
      capabilities:
        drop: ["ALL"]
        add: ["NET_BIND_SERVICE"]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
    log:
      level: INFO
    persistence:
      enabled: false
