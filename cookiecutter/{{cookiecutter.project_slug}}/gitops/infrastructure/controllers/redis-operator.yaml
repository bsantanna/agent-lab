apiVersion: v1
kind: Namespace
metadata:
  name: ot-operators
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ot-helm
  namespace: ot-operators
spec:
  interval: 1h
  url: https://ot-container-kit.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: ot-operators
spec:
  interval: 30m
  chart:
    spec:
      chart: redis-operator
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: ot-helm
  install:
    remediation:
      retries: 3
  values:
    featureGates:
      GenerateConfigInInitContainer: true
