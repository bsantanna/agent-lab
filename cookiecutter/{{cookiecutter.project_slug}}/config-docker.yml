api_base_url: "http://localhost:18000"
auth:
  enabled: false
broker:
  url: "redis://redis:6379/0"
db:
  url: "postgresql://postgres:postgres@postgres:5432/{{ cookiecutter.package_name }}"
  vectors: "postgresql://postgres:postgres@postgres:5432/{{ cookiecutter.package_name }}_vectors"
  checkpoints: "postgresql://postgres:postgres@postgres:5432/{{ cookiecutter.package_name }}_checkpoints"
vault:
  url: "http://vault:8200"
  token: "dev-only-token"
