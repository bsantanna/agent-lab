name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-24.04
{%- if cookiecutter.include_release_pipeline %}
    if: {% raw %}${{ !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release') }}{% endraw %}
{%- endif %}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen --group dev --group test
      - name: Lint
        run: make lint
      - name: Unit tests
        run: make test_unit
{%- if cookiecutter.include_testcontainers %}
      - name: Integration tests
        run: make test_integration
{%- endif %}
