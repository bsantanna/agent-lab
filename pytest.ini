[pytest]
pythonpath = .
testpaths = tests
addopts = -m "not agent_test"
filterwarnings =
    ignore:The @wait_container_is_ready decorator is deprecated:DeprecationWarning:testcontainers
    ignore:The wait_for_logs function with string or callable predicates is deprecated:DeprecationWarning:testcontainers
    ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning
    ignore:authlib.jose module is deprecated:authlib.deprecate.AuthlibDeprecationWarning
markers =
    agent_test: end-to-end agent simulations that call live LLM providers and the browser; deselected by default, run explicitly with -m agent_test
