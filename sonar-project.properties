sonar.projectKey=btech-software_agent-lab
sonar.organization=btech-software
sonar.sources=./
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12
sonar.exclusions=tests/**,notebooks/**
sonar.coverage.exclusions=tests/**,notebooks/**,dags/**,charts/**,frontend/**

# Rule suppressions for test code (false positives / acceptable test-only patterns)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
# S5332: dummy http:// endpoints in tests; testcontainers (Keycloak, Ollama) require plain http
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
# S7493: synchronous file IO inside async test functions is acceptable in tests
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S7493
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
# S2068: credentials for ephemeral testcontainers, not real secrets
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
# S6418: fake api_key values used to exercise validation errors
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S6418
sonar.issue.ignore.multicriteria.e4.resourceKey=tests/**
